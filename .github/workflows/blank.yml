name: Image Workflow

on:
  push:
    paths:
      - "icon/**"
  pull_request:
    paths:
      - "icon/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate JSON
        run: python .github/scripts/generate_image_json.py
        env:
          ICONS_BASE_REF: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-artifact
          path: ${{ github.workspace }}/zhangjiawen.icons.json

      - name: Commit generated JSON
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- zhangjiawen.icons.json; then
            echo "No JSON changes to commit."
            exit 0
          fi

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add zhangjiawen.icons.json
          git commit -m "Auto-update icon manifest"
          git push origin HEAD:${{ github.ref_name }}
